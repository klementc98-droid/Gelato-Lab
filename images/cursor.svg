<svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 40 48">
  <!-- Scoop -->
  <circle cx="20" cy="15" r="14" fill="#c8dba8" stroke="#7a8a67" stroke-width="1.5"/>
  <!-- Scoop highlight -->
  <ellipse cx="14" cy="10" rx="5" ry="4" fill="rgba(255,255,255,0.35)"/>
  <!-- Scoop bottom flat edge cover -->
  <rect x="6" y="26" width="28" height="4" fill="#c8dba8"/>
  <!-- Cone body -->
  <polygon points="6,26 34,26 20,48" fill="#e8b87a" stroke="#c09040" stroke-width="1.5"/>
  <!-- Waffle horizontal lines -->
  <line x1="7" y1="29" x2="33" y2="29" stroke="#c09040" stroke-width="0.9" opacity="0.65"/>
  <line x1="9" y1="33" x2="31" y2="33" stroke="#c09040" stroke-width="0.9" opacity="0.65"/>
  <line x1="12" y1="37" x2="28" y2="37" stroke="#c09040" stroke-width="0.9" opacity="0.65"/>
  <line x1="15" y1="41" x2="25" y2="41" stroke="#c09040" stroke-width="0.9" opacity="0.65"/>
  <!-- Waffle diagonal lines -->
  <line x1="10" y1="26" x2="20" y2="48" stroke="#c09040" stroke-width="0.7" opacity="0.45"/>
  <line x1="16" y1="26" x2="20" y2="48" stroke="#c09040" stroke-width="0.7" opacity="0.45"/>
  <line x1="22" y1="26" x2="20" y2="48" stroke="#c09040" stroke-width="0.7" opacity="0.45"/>
  <line x1="28" y1="26" x2="20" y2="48" stroke="#c09040" stroke-width="0.7" opacity="0.45"/>
</svg>
