<svg xmlns="http://www.w3.org/2000/svg" width="28" height="30" viewBox="0 0 28 30">
  <!-- Cone pointing upper-left (the click tip) -->
  <polygon points="3,3 21,13 9,23" fill="#e8c07a" stroke="#b08040" stroke-width="1.3"/>
  <!-- Waffle lines on cone -->
  <line x1="7" y1="7" x2="11" y2="9" stroke="#b08040" stroke-width="0.9" opacity="0.65"/>
  <line x1="10" y1="12" x2="17" y2="15" stroke="#b08040" stroke-width="0.9" opacity="0.65"/>
  <!-- Scoop sitting at the wide end of the cone -->
  <circle cx="17" cy="22" r="7.5" fill="#c8dba8" stroke="#7a8a67" stroke-width="1.3"/>
  <!-- Scoop highlight -->
  <ellipse cx="14" cy="19" rx="3" ry="2.5" fill="rgba(255,255,255,0.38)"/>
</svg>
